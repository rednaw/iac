# Composite action: install SOPS and yq (versions pinned via mise.toml) and write the AGE key file.

name: 'SOPS setup'
description: 'Install SOPS and yq from versions pinned in mise.toml, and write the AGE key file.'

inputs:
  sops_age_key:
    description: 'SOPS AGE key'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Get SOPS version from mise.toml
      id: sops-version
      shell: bash
      run: |
        version=$(sed -n 's/^[[:space:]]*sops[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' mise.toml)
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Write AGE key file
      shell: bash
      env:
        SOPS_AGE_KEY: ${{ inputs.sops_age_key }}
      run: |
        mkdir -p ~/.config/sops/age
        echo "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
        chmod 600 ~/.config/sops/age/keys.txt

    - name: Install SOPS and yq
      shell: bash
      run: |
        SOPS_VER="${{ steps.sops-version.outputs.version }}"
        curl -sSLo sops "https://github.com/getsops/sops/releases/download/v${SOPS_VER}/sops-v${SOPS_VER}.linux.amd64"
        chmod +x sops
        sudo mv sops /usr/local/bin/sops
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
