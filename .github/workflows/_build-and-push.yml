# Reusable workflow: build and push a Docker image to the platform registry.
# Callers must set REGISTRY_URL and IMAGE_NAME as GitHub Actions variables,
# and pass REGISTRY_USERNAME and REGISTRY_PASSWORD as explicit secrets.
#
# Thin caller template (generated by task platform:init):
#
#   on:
#     push:
#       branches: [main]
#
#   jobs:
#     build-and-push:
#       uses: rednaw/iac/.github/workflows/_build-and-push.yml@main
#       secrets:
#         REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
#         REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

name: Build and push image

on:
  workflow_call:
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "description=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
          echo "created=$(git log -1 --pretty=%cI | sed -E 's/(.*)T(.*)\+.*$/\1 \2/')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
            ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.description=${{ steps.meta.outputs.description }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
