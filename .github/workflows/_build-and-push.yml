# Reusable workflow: build and push a Docker image to the platform registry.
# Callers must set REGISTRY_URL and IMAGE_NAME as GitHub Actions variables,
# and pass REGISTRY_USERNAME and REGISTRY_PASSWORD as explicit secrets.
#
# Thin caller template (generated by task platform:init):
#
#   on:
#     push:
#       branches: [main]
#
#   jobs:
#     build-and-push:
#       uses: rednaw/iac/.github/workflows/_build-and-push.yml@main
#       secrets:
#         REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
#         REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

name: Build and push image

on:
  workflow_call:
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
