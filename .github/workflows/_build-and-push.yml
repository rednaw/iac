# Reusable workflow: build and push a Docker image to the platform registry.
# Caller must pass REGISTRY_USERNAME and REGISTRY_PASSWORD as secrets.
# REGISTRY_URL and IMAGE_NAME come from caller repo variables, or can be passed as inputs.
#
# Example caller (repository variables REGISTRY_URL, IMAGE_NAME, and secrets set):
#
#   on:
#     push:
#       branches: [main]
#   jobs:
#     build-and-push:
#       uses: rednaw/iac/.github/workflows/_build-and-push.yml@main
#       secrets:
#         REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
#         REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
#
# Optional: pass registry/image explicitly instead of using vars:
#
#   jobs:
#     build-and-push:
#       uses: rednaw/iac/.github/workflows/_build-and-push.yml@main
#       with:
#         REGISTRY_URL: ${{ vars.REGISTRY_URL }}
#         IMAGE_NAME: ${{ vars.IMAGE_NAME }}
#       secrets:
#         REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
#         REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

name: Build and push image

on:
  workflow_call:
    inputs:
      REGISTRY_URL:
        description: 'Registry URL (e.g. ghcr.io or registry.example.com)'
        required: false
        type: string
      IMAGE_NAME:
        description: 'Image name (e.g. owner/repo or myorg/myapp)'
        required: false
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_URL: ${{ inputs.REGISTRY_URL || vars.REGISTRY_URL }}
      IMAGE_NAME: ${{ inputs.IMAGE_NAME || vars.IMAGE_NAME || github.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "description=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
          echo "created=$(git log -1 --pretty=%cI | sed -E 's/(.*)T(.*)\+.*$/\1 \2/')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.description=${{ steps.meta.outputs.description }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
