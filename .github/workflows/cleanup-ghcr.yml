name: Cleanup ghcr.io iac-dev images

on:
  schedule:
    - cron: '0 3 * * 0'  # weekly, Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    name: Prune old iac-dev versions (keep last 12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: iac-dev
          package-type: container
          min-versions-to-keep: 12
