# One-off: delete all GitHub Actions caches for this repo (e.g. to clear the 10 GB limit).
# Run from Actions → Delete all caches → Run workflow.

name: Delete all caches

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  delete:
    name: Delete all caches
    runs-on: ubuntu-latest
    steps:
      - name: Delete all Actions caches
        run: gh cache delete --all --succeed-on-no-caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
