# On push to main: promote tested image (by SHA) to latest, or build from main, test, and push if no image exists.

name: Promote image to latest

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/iac-dev
  DOCKER_BUILDKIT: 1

jobs:
  promote-or-build:
    name: Promote or build
    runs-on: ubuntu-latest
    outputs:
      promoted: ${{ steps.promote.outputs.promoted }}
      image: ${{ steps.promote.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # If image for this commit exists (e.g. from merged Renovate PR), re-tag as latest
      - name: Promote existing image to latest
        id: promote
        run: |
          IMG="${{ env.IMAGE }}:${{ github.sha }}"
          if docker pull "$IMG" 2>/dev/null; then
            docker tag "$IMG" "${{ env.IMAGE }}:latest"
            docker push "${{ env.IMAGE }}:latest"
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          fi
          echo "image=${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.promote.outputs.promoted != 'true'
        uses: docker/setup-buildx-action@v4

      # Build and push as :sha so the test job can pull it; we tag as latest only after tests pass
      - name: Build and push image (no existing image)
        if: steps.promote.outputs.promoted != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}


  test:
    name: Run all checks
    if: needs.promote-or-build.outputs.promoted != 'true'
    needs: promote-or-build
    uses: ./.github/workflows/run-iac-tests.yml
    with:
      image: ${{ needs.promote-or-build.outputs.image }}
    secrets: inherit

  push-latest:
    name: Tag and push latest
    if: needs.promote-or-build.outputs.promoted != 'true'
    needs: [promote-or-build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push as latest
        run: |
          docker pull ${{ needs.promote-or-build.outputs.image }}
          docker tag ${{ needs.promote-or-build.outputs.image }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:latest
