# On push to main: promote tested image (by SHA) to latest, or build from main, test, and push if no image exists.

name: Promote image to latest

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: iac/iac-dev
  DOCKER_BUILDKIT: 1

jobs:
  promote-or-build:
    name: Promote or build
    runs-on: ubuntu-latest
    outputs:
      promoted: ${{ steps.promote.outputs.promoted }}
      image: ${{ steps.promote.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: SOPS decrypt and registry login
        id: sops-registry
        uses: ./.github/actions/sops-registry-login
        with:
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      # If image for this commit exists (e.g. from merged Renovate PR), re-tag as latest
      - name: Promote existing image to latest
        id: promote
        run: |
          REGISTRY="${{ steps.sops-registry.outputs.registry }}"
          IMG="$REGISTRY/${{ env.IMAGE_REPO }}:${{ github.sha }}"
          if docker pull "$IMG" 2>/dev/null; then
            docker tag "$IMG" "$REGISTRY/${{ env.IMAGE_REPO }}:latest"
            docker push "$REGISTRY/${{ env.IMAGE_REPO }}:latest"
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          fi
          echo "image=$REGISTRY/${{ env.IMAGE_REPO }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.promote.outputs.promoted != 'true'
        uses: docker/setup-buildx-action@v3

      # Build and push as :sha so the test job can pull it; we tag as latest only after tests pass
      - name: Build and push image (no existing image)
        if: steps.promote.outputs.promoted != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.sops-registry.outputs.registry }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}


  test:
    name: Run all checks
    if: needs.promote-or-build.outputs.promoted != 'true'
    needs: promote-or-build
    uses: ./.github/workflows/run-iac-tests.yml
    with:
      image: ${{ needs.promote-or-build.outputs.image }}
    secrets: inherit

  push-latest:
    name: Tag and push latest
    if: needs.promote-or-build.outputs.promoted != 'true'
    needs: [promote-or-build, test]
    runs-on: ubuntu-latest
    steps:
      - name: SOPS decrypt and registry login
        id: sops-registry
        uses: ./.github/actions/sops-registry-login
        with:
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Tag and push as latest
        run: |
          docker pull ${{ needs.promote-or-build.outputs.image }}
          docker tag ${{ needs.promote-or-build.outputs.image }} ${{ steps.sops-registry.outputs.registry }}/${{ env.IMAGE_REPO }}:latest
          docker push ${{ steps.sops-registry.outputs.registry }}/${{ env.IMAGE_REPO }}:latest
