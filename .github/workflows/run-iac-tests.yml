# Reusable workflow: run IAC test suite inside a Docker image.

name: Run IAC tests

on:
  workflow_call:
    inputs:
      image:
        description: "Docker image to run tests in (e.g. ghcr.io/rednaw/iac-dev:latest)"
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Run all checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform security (tfsec)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ inputs.image }} \
            sh -c "mise trust -a && task test:terraform:security"

      - name: Terraform validation
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e TF_DATA_DIR=/tmp/terraform-validate \
            ${{ inputs.image }} \
            sh -c "mise trust -a && task test:terraform:validate"

      - name: Ansible lint
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ inputs.image }} \
            sh -c "mise trust -a && task test:ansible:lint"

      - name: Ansible collections and syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ inputs.image }} \
            sh -c "mise trust -a && ansible-galaxy collection install -r ansible/requirements.yml && task test:ansible:syntax"

      - name: Taskfile validation
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ inputs.image }} \
            sh -c "mise trust -a && task test:taskfiles"
