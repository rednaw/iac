# PRs: use pre-built image (latest) or build on Renovate PRs. Push to main promotes tested image to latest (see promote-image.yml).

name: IAC Static Code Analysis

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/iac-dev
  DOCKER_BUILDKIT: 1

jobs:
  image:
    name: Resolve image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set-output.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Renovate PR: build and push as <sha> (promoted to latest on merge)
      - name: Build and push (Renovate PR)
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate-bot/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      # Other PR / dispatch: use latest; bootstrap build if missing
      - name: Ensure latest image exists
        if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'renovate-bot/')
        run: |
          if ! docker pull ${{ env.IMAGE }}:latest 2>/dev/null; then
            echo "No latest image found, building bootstrap..."
            docker buildx build \
              --push \
              --build-arg GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
              -t ${{ env.IMAGE }}:latest \
              --cache-from type=gha --cache-to type=gha,mode=max \
              .
          fi

      - name: Set image output
        id: set-output
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && echo "${{ github.head_ref }}" | grep -q '^renovate-bot/'; then
            echo "image=${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ env.IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Run all checks
    uses: ./.github/workflows/run-iac-tests.yml
    needs: image
    with:
      image: ${{ needs.image.outputs.image }}
    secrets: inherit
