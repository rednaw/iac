# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  USERNAME:
    sh: whoami
  HOME:
    sh: echo $HOME
  SOPS_CONFIG_DIR: '{{.HOME}}/.config/sops/age'
  SOPS_KEY_FILE: '{{.SOPS_CONFIG_DIR}}/keys.txt'

includes:
  hostkeys: tasks/Taskfile.hostkeys.yml
  terraform: tasks/Taskfile.terraform.yml
  secrets: tasks/Taskfile.secrets.yml
  ansible: tasks/Taskfile.ansible.yml
  workflow: tasks/Taskfile.workflow.yml
  server: tasks/Taskfile.server.yml
  tunnel: tasks/Taskfile.tunnel.yml
  backup: tasks/Taskfile.backup.yml
  test: tasks/Taskfile.test.yml
  registry: tasks/Taskfile.registry.yml
  app: tasks/Taskfile.app.yml

tasks:
  default:
    desc: Show available commands
    cmds:
      - task: help

  help:
    desc: Show help message
    silent: true
    cmds:
      - |
        echo "Infrastructure as Code"
        echo ""
        echo "Terraform commands:"
        echo "  task terraform:reconfigure            # Reconfigure backend after org/project change (dev+prod)"
        echo "  task terraform:plan    -- [dev|prod]  # Plan changes"
        echo "  task terraform:apply   -- [dev|prod]  # Apply changes"
        echo "  task terraform:destroy -- [dev|prod]  # Destroy resources"
        echo "  task terraform:output  -- [dev|prod]  # Show outputs"
        echo ""
        echo "Ansible commands:"
        echo "  task ansible:bootstrap -- [dev|prod]  # One-time bootstrap as root"
        echo "  task ansible:run       -- [dev|prod]  # Full server config"
        echo ""
        echo "Workflow (Prefect):"
        echo "  task workflow:deploy  -- [dev|prod]   # Deploy Prefect flows"
        echo ""
        echo "Application Deployment:"
        echo "  task app:deploy   -- [dev|prod] <sha> # Deploy application"
        echo "  task app:versions -- [dev|prod]       # List available image versions"
        echo ""
        echo "Testing:"
        echo "  task test:run                         # Run all tests (validate, format check, security scan)"
        echo ""
        echo "SSH Tunnel:"
        echo "  task tunnel:start -- [dev|prod]       # Start SSH tunnel"
        echo "  task tunnel:stop  -- [dev|prod]       # Stop SSH tunnel"
        echo ""
        echo "Secrets Management (SOPS):"
        echo "  task secrets:keygen                   # Generate age key pair"
        echo "  task secrets:generate-sops-config     # Generate .sops.yaml"
        echo ""
        echo "Registry:"
        echo "  task registry:overview                # List tags (TAG, CREATED, DESCRIPTION) for all repos"
        echo ""
        echo "Utilities:"
        echo "  task server:check-status              # Check if servers are up (checks both dev and prod)"
        echo "  task server:list-hetzner-keys         # List Hetzner SSH keys with IDs"
        echo ""
        echo "Backups (Restic, mounted app):"
        echo "  task backup:snapshots -- [dev|prod]              # Local snapshots (slug from app/.iac iac.yml)"
        echo "  task backup:restore   -- [dev|prod] [snap] [...] # Restore (same slug rule as deploy)"
        echo "  task backup:download  -- [dev|prod]              # Server Restic repo → .backup-repos/<slug>/"
        echo "  task backup:upload    -- [dev|prod]              # .backup-repos/<slug>/ → server (replaces remote repo)"

  # Internal validation tasks - used by other tasks via deps or direct calls
  _check:sops-key:
    desc: "(internal) Ensure SOPS key exists"
    internal: true
    preconditions:
      - sh: test -f "{{.SOPS_KEY_FILE}}"
        msg: "SOPS key file not found. Run 'task secrets:keygen' first."

  _check:workspace:
    desc: "(internal) Validate CLI_ARGS first word is dev or prod"
    internal: true
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Workspace required. Pass dev or prod after -- (e.g. task ansible:run -- dev)"
      - sh: 'W=$(echo "{{.CLI_ARGS}}" | awk "{print \$1}"); [ "$W" = "dev" ] || [ "$W" = "prod" ]'
        msg: "Invalid workspace. Use: dev or prod after --"

