---
# Deploy Prefect flow code to servers. Run with: task workflow:deploy -- <workspace>
# This playbook syncs flow code from prefect/ to /opt/iac/prefect/flows on target hosts.
# It rebuilds the worker image if Dockerfile changed, then restarts the worker.

- name: Deploy Prefect flows to servers
  hosts: "{{ target_workspace }}"
  gather_facts: false
  become: true
  vars:
    # Required at runtime: task workflow:deploy -- [dev|prod]. Default allows ansible-playbook --syntax-check to pass.
    target_workspace: "localhost"
    prefect_flow_code_host_path: /opt/iac/prefect/flows
    prefect_worker_image: prefect-worker
    repo_root: "{{ playbook_dir }}/../.."

  pre_tasks:
    - name: Decrypt and load infrastructure secrets
      ansible.builtin.import_tasks: ../tasks/secrets.yml

  tasks:
    - name: Check if Prefect flow code directory exists in repo
      ansible.builtin.stat:
        path: "{{ repo_root }}/prefect"
      register: prefect_src_stat
      delegate_to: localhost
      become: false

    - name: Copy Prefect flow code from IaC repo to host
      ansible.posix.synchronize:
        src: "{{ repo_root }}/prefect/"
        dest: "{{ prefect_flow_code_host_path }}/"
        delete: true
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=.git"
          - "--checksum"
          - "--omit-dir-times"
      register: prefect_sync_result
      when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

    - name: Fix ownership of Prefect subtree (sync runs as ubuntu; design is root-owned)
      ansible.builtin.file:
        path: /opt/iac/prefect
        state: directory
        recurse: true
        owner: root
        group: root
      when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

    - name: Get checksum of Dockerfile.worker (triggers rebuild when it changes)
      ansible.builtin.stat:
        path: "{{ prefect_flow_code_host_path }}/Dockerfile.worker"
        checksum_algorithm: sha256
      register: prefect_dockerfile_stat
      when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

    - name: Check if previous worker image build checksum exists
      ansible.builtin.stat:
        path: /opt/iac/prefect/.worker-image.checksum
      register: prefect_worker_checksum_file_stat
      when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

    - name: Read previous worker image build checksum
      ansible.builtin.slurp:
        src: /opt/iac/prefect/.worker-image.checksum
      register: prefect_worker_checksum_prev
      when: prefect_worker_checksum_file_stat.stat is defined and prefect_worker_checksum_file_stat.stat.exists

    - name: Set fact when worker image needs rebuild (Dockerfile changed or no previous checksum)
      ansible.builtin.set_fact:
        prefect_worker_rebuild: "{{ prefect_worker_checksum_prev is skipped or (prefect_worker_checksum_prev.content | default('') | b64decode | trim) != (prefect_dockerfile_stat.stat.checksum) }}"
      when: prefect_dockerfile_stat.stat is defined

    - name: Build Prefect worker image
      community.docker.docker_image:
        name: "{{ prefect_worker_image }}"
        source: build
        force_source: "{{ prefect_worker_rebuild | default(true) }}"
        build:
          path: "{{ prefect_flow_code_host_path }}"
          dockerfile: Dockerfile.worker
      register: prefect_image_build
      when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

    - name: Record worker image build checksum after rebuild
      ansible.builtin.copy:
        content: "{{ prefect_dockerfile_stat.stat.checksum }}"
        dest: /opt/iac/prefect/.worker-image.checksum
        mode: '0644'
      when:
        - prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir
        - prefect_worker_rebuild | default(true) | bool
        - prefect_dockerfile_stat.stat.checksum is defined

    - name: Restart Prefect worker if code or image changed
      community.docker.docker_container:
        name: prefect-worker
        image: "{{ prefect_worker_image }}"
        state: started
        restart: "{{ (prefect_sync_result.changed | default(false)) or (prefect_image_build.changed | default(false)) }}"
        restart_policy: unless-stopped
        log_driver: json-file
        log_options:
          max-size: "10m"
          max-file: "3"
        command: prefect worker start --pool host-pool
        env:
          PREFECT_API_URL: "http://prefect-server:4200/api"
          REGISTRY_URL: "registry.{{ infrastructure_secrets.base_domain }}"
          DOCKER_CONFIG: "/opt/iac/.docker"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "/opt/iac:/opt/iac"
        working_dir: /opt/iac/prefect/flows
        networks:
          - name: prefect-network
      when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

    - name: Register Prefect deployments
      ansible.builtin.shell: |
        docker run --rm \
          --network prefect-network \
          -e PREFECT_API_URL=http://prefect-server:4200/api \
          -e DOCKER_CONFIG=/opt/iac/.docker \
          -v /opt/iac:/opt/iac \
          -w /opt/iac/prefect/flows \
          {{ prefect_worker_image }} \
          prefect deploy --all 2>&1
      register: prefect_register
      changed_when: false
      failed_when: (prefect_register.rc != 0) and ('successfully created' not in (prefect_register.stdout | default('')))
      when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir
