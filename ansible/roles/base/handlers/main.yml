---
# Handlers for base role.
# Restart fail2ban is also notified by roles/platform/tasks/fail2ban-traefik.yml
# (handlers from all roles in a play merge into the play's handler space).

- name: Restart sshd
  ansible.builtin.systemd:
    name: ssh
    state: reloaded

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
