---
# OpenObserve + OTEL Collector (host and Docker metrics). Dashboard import from role files.

- name: Create OpenObserve data directory
  ansible.builtin.file:
    path: /var/lib/openobserve
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create OTEL Collector config directory
  ansible.builtin.file:
    path: /etc/otel-collector
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Generate OpenObserve ingest auth key (base64 email:password)
  ansible.builtin.set_fact:
    openobserve_ingest_auth: "{{ (infrastructure_secrets.openobserve_username + '@observe.local:' + infrastructure_secrets.openobserve_password) | b64encode }}"
  no_log: true

- name: Deploy OTEL Collector config (host metrics -> OpenObserve)
  ansible.builtin.template:
    src: otel-collector-config.yaml.j2
    dest: /etc/otel-collector/config.yaml
    mode: '0644'
    owner: root
    group: root
  notify: Restart OTEL Collector

- name: Ensure OpenObserve network exists
  community.docker.docker_network:
    name: openobserve-network
    driver: bridge
    state: present

- name: Ensure OpenObserve container is running
  community.docker.docker_container:
    name: openobserve
    image: openobserve/openobserve:v0.70.2
    state: started
    restart_policy: unless-stopped
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
    env:
      ZO_ROOT_USER_EMAIL: "{{ infrastructure_secrets.openobserve_username }}@observe.local"
      ZO_ROOT_USER_PASSWORD: "{{ infrastructure_secrets.openobserve_password }}"
      ZO_LOCAL_MODE: "true"
      ZO_RETENTION_DAYS: "7"
    ports:
      - "127.0.0.1:57800:5080"
    volumes:
      - /var/lib/openobserve:/data
    networks:
      - name: openobserve-network
    healthcheck:
      test: ["CMD", "/openobserve", "view", "-c", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

- name: Ensure OTEL Collector container is running (Linux host metrics + Docker + logs -> OpenObserve)
  community.docker.docker_container:
    name: otel-collector
    image: otel/opentelemetry-collector-contrib:0.148.0
    state: started
    restart_policy: unless-stopped
    # Cap memory so backpressure does not grow unbounded
    memory: "512m"
    memory_swap: "512m"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
    user: "0"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - /etc/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Single /var/log mount so collector can read all log files (traefik, syslog, auth, fail2ban)
      - /var/log:/var/log:ro
    networks:
      - name: openobserve-network
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

- name: Wait for OpenObserve API to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:57800/api/health"
    method: GET
    status_code: [200, 401]
  register: openobserve_health
  until: openobserve_health.status in [200, 401]
  retries: 10
  delay: 5
  ignore_errors: true

- name: Set dashboard definitions
  ansible.builtin.set_fact:
    openobserve_dashboards:
      - { title: 'Host Metrics', file: 'openobserve-host-metrics.json' }
      - { title: 'Docker Container Metrics', file: 'openobserve-docker-metrics.json' }
      - { title: 'Traefik Metrics', file: 'openobserve-traefik-metrics.json' }

# List returns { "dashboards": [ { "dashboard_id", "title", ... } ] }. Match by title and use dashboard_id for PUT.
# OpenObserve dashboard PUT (update) can return 500 (hash validation issues); we accept it so the playbook does not fail.
- name: Get existing OpenObserve dashboards list
  ansible.builtin.uri:
    url: "http://127.0.0.1:57800/api/default/dashboards"
    method: GET
    headers:
      Authorization: "Basic {{ openobserve_ingest_auth }}"
    status_code: [200]
  register: openobserve_dashboards_list
  when: openobserve_health.status in [200, 401]

- name: Build dashboard id map by title
  ansible.builtin.set_fact:
    openobserve_dashboard_ids: "{{ openobserve_dashboard_ids | default({}) | combine({_title: _id}) }}"
  loop: "{{ openobserve_dashboards_list.json.dashboards | default([]) }}"
  vars:
    _title: "{{ item.title | default((item.v8 | default({})).title) | default('') }}"
    _id: "{{ item.dashboard_id | default(item.id) | default((item.v8 | default({})).dashboardId) | default('') }}"
  when:
    - openobserve_health.status in [200, 401]
    - openobserve_dashboards_list.json is defined
    - _title != ''
  loop_control:
    label: "{{ _title }}"

- name: Create OpenObserve dashboard (when missing)
  ansible.builtin.uri:
    url: "http://127.0.0.1:57800/api/default/dashboards"
    method: POST
    headers:
      Authorization: "Basic {{ openobserve_ingest_auth }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ lookup('file', role_path + '/files/' + item.file) | from_json }}"
    status_code: [200, 201, 409]
  when:
    - openobserve_health.status in [200, 401]
    - (openobserve_dashboard_ids[item.title] | default('')) == ''
  failed_when: false
  loop: "{{ openobserve_dashboards }}"
  loop_control:
    label: "{{ item.title }}"

- name: Update OpenObserve dashboard in place
  ansible.builtin.uri:
    url: "http://127.0.0.1:57800/api/default/dashboards/{{ openobserve_dashboard_ids[item.title] }}"
    method: PUT
    headers:
      Authorization: "Basic {{ openobserve_ingest_auth }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ lookup('file', role_path + '/files/' + item.file) | from_json }}"
    status_code: [200, 201, 500]
  when:
    - openobserve_health.status in [200, 401]
    - (openobserve_dashboard_ids[item.title] | default('')) != ''
  failed_when: false
  loop: "{{ openobserve_dashboards }}"
  loop_control:
    label: "{{ item.title }}"
