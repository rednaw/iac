---
# yaml-language-server: $schema=https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/ansible.json#/$defs/tasks
# Prefect: server and worker in containers. Worker has Docker socket + crane for registry/backup jobs.
# Flow code is synced separately via prefect-deploy.yml playbook (task workflow:deploy).
# Registry auth shared at /opt/iac/.docker. See docs/server-layout.md.

- name: Set Prefect variables
  ansible.builtin.set_fact:
    prefect_flow_code_host_path: /opt/iac/prefect/flows
    prefect_server_port: 57802
    prefect_worker_image: prefect-worker

- name: Assert base_domain is set (for consistency with other server components)
  ansible.builtin.assert:
    that: infrastructure_secrets.base_domain is defined and infrastructure_secrets.base_domain | length > 0
    fail_msg: "'base_domain' is missing from iac.yml."
    quiet: true

- name: Create Prefect flow code directory on host
  ansible.builtin.file:
    path: "{{ prefect_flow_code_host_path }}"
    state: directory
    mode: '0755'

- name: Ensure Prefect .ssh directory exists (flow-only keys, e.g. Storage Box)
  ansible.builtin.file:
    path: /opt/iac/prefect/.ssh
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Ensure Prefect network exists
  community.docker.docker_network:
    name: prefect-network
    driver: bridge
    state: present

- name: Ensure Prefect base directory exists
  ansible.builtin.file:
    path: /opt/iac/prefect
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure Prefect DB password file exists on host (create if missing)
  ansible.builtin.shell: |
    if [ ! -f /opt/iac/prefect/.prefect-db-password ]; then
      openssl rand -hex 16 > /opt/iac/prefect/.prefect-db-password
      chmod 600 /opt/iac/prefect/.prefect-db-password
    fi
  changed_when: false

- name: Read Prefect DB password
  ansible.builtin.slurp:
    src: /opt/iac/prefect/.prefect-db-password
  register: _prefect_db_password_slurp

- name: Set Prefect DB password fact
  ansible.builtin.set_fact:
    _prefect_db_password: "{{ (_prefect_db_password_slurp.content | b64decode) | trim }}"
  no_log: true

- name: Ensure Prefect Postgres container is running
  community.docker.docker_container:
    name: prefect-db
    image: postgres:16-alpine
    state: started
    restart_policy: unless-stopped
    env:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: "{{ _prefect_db_password }}"
      POSTGRES_DB: prefect
    volumes:
      - prefect-db-data:/var/lib/postgresql/data
    networks:
      - name: prefect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  no_log: true

- name: Wait for Prefect DB (pg_isready)
  ansible.builtin.command:
    cmd: docker exec prefect-db pg_isready -U prefect
  register: _prefect_db_ready
  until: _prefect_db_ready.rc == 0
  retries: 12
  delay: 5
  changed_when: false

- name: Ensure Prefect server container is running
  community.docker.docker_container:
    name: prefect-server
    image: prefecthq/prefect:3-python3.11
    state: started
    restart_policy: unless-stopped
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
    command: prefect server start --host 0.0.0.0
    env:
      PREFECT_HOME: /data
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect:{{ _prefect_db_password }}@prefect-db:5432/prefect"
      PREFECT_UI_API_URL: "http://127.0.0.1:{{ prefect_server_port }}/api"
    ports:
      - "127.0.0.1:{{ prefect_server_port }}:4200"
    volumes:
      - prefect-server-data:/data
    networks:
      - name: prefect-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
  no_log: true

- name: Wait for Prefect server API to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ prefect_server_port }}/api/health"
    method: GET
    status_code: [200, 401]
    timeout: 5
  register: prefect_health
  until: prefect_health.status in [200, 401]
  retries: 12
  delay: 5

- name: Check if worker image exists locally
  community.docker.docker_image_info:
    name: "{{ prefect_worker_image }}"
  register: _prefect_worker_image_info

- name: Bootstrap worker image on first run (sync source + build)
  when: _prefect_worker_image_info.images | length == 0
  block:
    - name: Sync Prefect source to host for initial image build
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../prefect/"
        dest: "{{ prefect_flow_code_host_path }}/"
        delete: true
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=.git"
          - "--checksum"
          - "--omit-dir-times"

    - name: Fix ownership of synced Prefect tree
      ansible.builtin.file:
        path: /opt/iac/prefect
        state: directory
        recurse: true
        owner: root
        group: root

    - name: Build worker image
      community.docker.docker_image:
        name: "{{ prefect_worker_image }}"
        source: build
        force_source: true
        build:
          path: "{{ prefect_flow_code_host_path }}"
          dockerfile: Dockerfile.worker

- name: Ensure Prefect worker container is running
  community.docker.docker_container:
    name: prefect-worker
    image: "{{ prefect_worker_image }}"
    state: started
    restart_policy: unless-stopped
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
    command: prefect worker start --pool host-pool
    env:
      PREFECT_API_URL: "http://prefect-server:4200/api"
      REGISTRY_URL: "registry.{{ infrastructure_secrets.base_domain }}"
      DOCKER_CONFIG: "/opt/iac/.docker"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/opt/iac:/opt/iac"
    working_dir: /opt/iac/prefect/flows
    networks:
      - name: prefect-network

- name: Ensure Prefect work pool host-pool exists
  ansible.builtin.shell: |
    docker run --rm \
      --network prefect-network \
      -e PREFECT_API_URL=http://prefect-server:4200/api \
      -e DOCKER_CONFIG=/opt/iac/.docker \
      -v /opt/iac:/opt/iac \
      -w /opt/iac/prefect/flows \
      {{ prefect_worker_image }} \
      prefect work-pool create host-pool --type process 2>&1
  register: prefect_work_pool
  changed_when: false
  failed_when: false

