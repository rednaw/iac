---
# yaml-language-server: $schema=https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/ansible.json#/$defs/tasks
# Prefect: server in container, worker on host (for host jobs: registry prune, backup, reboot).
# Requires: deploy user (in docker group), Docker. Flow code synced to /opt/prefect/flows.
# Run deploy-user (e.g. uncomment in server main.yml) before Prefect so the worker can run as deploy.

- name: Set Prefect variables
  ansible.builtin.set_fact:
    prefect_flow_code_host_path: /opt/prefect/flows
    prefect_server_port: 57802
    prefect_venv_path: /opt/prefect/venv

- name: Assert base_domain is set (for consistency with other server components)
  ansible.builtin.assert:
    that: infrastructure_secrets.base_domain is defined and infrastructure_secrets.base_domain | length > 0
    fail_msg: "'base_domain' is missing from iac.yml."
    quiet: true

- name: Create Prefect flow code directory on host
  ansible.builtin.file:
    path: "{{ prefect_flow_code_host_path }}"
    state: directory
    mode: '0755'

- name: Check if Prefect flow code directory exists in repo
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../prefect"
  register: prefect_src_stat
  delegate_to: localhost
  become: false

- name: Copy Prefect flow code from IaC repo to host
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../prefect/"
    dest: "{{ prefect_flow_code_host_path }}/"
    delete: true
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=.git"
      - "--checksum"
      - "--omit-dir-times"
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure Prefect network exists
  community.docker.docker_network:
    name: prefect-network
    driver: bridge
    state: present

- name: Ensure Prefect server container is running
  community.docker.docker_container:
    name: prefect-server
    image: prefecthq/prefect:2-python3.11
    state: started
    restart_policy: unless-stopped
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
    command: prefect server start --host 0.0.0.0
    env:
      PREFECT_HOME: /data
    ports:
      - "127.0.0.1:{{ prefect_server_port }}:4200"
    volumes:
      - prefect-server-data:/data
    networks:
      - name: prefect-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

- name: Wait for Prefect server API to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ prefect_server_port }}/api/health"
    method: GET
    status_code: [200, 401]
    timeout: 5
  register: prefect_health
  until: prefect_health.status in [200, 401]
  retries: 12
  delay: 5

- name: Get Prefect server version (worker must match to avoid WebSocket 500)
  ansible.builtin.command:
    cmd: docker exec prefect-server python -c "import prefect; print(prefect.__version__)"
  register: prefect_server_version_result
  changed_when: false
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Set Prefect server version for venv
  ansible.builtin.set_fact:
    prefect_version_pin: "{{ prefect_server_version_result.stdout | trim }}"
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure python3-venv is installed (for Prefect venv)
  ansible.builtin.apt:
    name: python3-venv
    state: present
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure Prefect venv exists
  ansible.builtin.command:
    cmd: python3 -m venv {{ prefect_venv_path }}
  args:
    creates: "{{ prefect_venv_path }}/bin/python"
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure Prefect venv has prefect (match server) and pyyaml
  ansible.builtin.pip:
    name:
      - "prefect=={{ prefect_version_pin | default('2.14.1') }}"
      - pyyaml
    state: present
    virtualenv: "{{ prefect_venv_path }}"
    virtualenv_command: python3 -m venv
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure deploy user owns Prefect venv (worker runs as deploy)
  ansible.builtin.file:
    path: "{{ prefect_venv_path }}"
    state: directory
    owner: deploy
    group: deploy
    recurse: true
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure Prefect work pool host-pool exists
  ansible.builtin.command:
    cmd: "{{ prefect_venv_path }}/bin/prefect work-pool create host-pool --type process"
  environment:
    PREFECT_API_URL: "http://127.0.0.1:{{ prefect_server_port }}/api"
  changed_when: false
  failed_when: false
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure Prefect worker systemd unit is deployed
  ansible.builtin.template:
    src: prefect-worker.service.j2
    dest: /etc/systemd/system/prefect-worker.service
    mode: '0644'
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure Prefect worker service is started
  ansible.builtin.systemd:
    name: prefect-worker
    state: started
    enabled: true
    daemon_reload: true
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Register Prefect deployments
  ansible.builtin.shell: |
    docker run --rm \
      --network host \
      -e PREFECT_API_URL=http://127.0.0.1:{{ prefect_server_port }}/api \
      -v {{ prefect_flow_code_host_path }}:/opt/prefect/flows:ro \
      -w /opt/prefect/flows \
      prefecthq/prefect:2-python3.11 \
      prefect deploy --all 2>&1
  register: prefect_register
  changed_when: false
  failed_when: (prefect_register.rc != 0) and ('successfully created' not in (prefect_register.stdout | default('')))
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir
