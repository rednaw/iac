---
# yaml-language-server: $schema=https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/ansible.json#/$defs/tasks
# Prefect: server and worker in containers. Worker has Docker socket + crane for registry/backup jobs.
# Flow code synced to /opt/iac/prefect/flows. Registry auth shared at /opt/iac/.docker. See docs/server-layout.md.

- name: Set Prefect variables
  ansible.builtin.set_fact:
    prefect_flow_code_host_path: /opt/iac/prefect/flows
    prefect_server_port: 57802
    prefect_worker_image: prefect-worker

- name: Assert base_domain is set (for consistency with other server components)
  ansible.builtin.assert:
    that: infrastructure_secrets.base_domain is defined and infrastructure_secrets.base_domain | length > 0
    fail_msg: "'base_domain' is missing from iac.yml."
    quiet: true

- name: Create Prefect flow code directory on host
  ansible.builtin.file:
    path: "{{ prefect_flow_code_host_path }}"
    state: directory
    mode: '0755'

- name: Check if Prefect flow code directory exists in repo
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../prefect"
  register: prefect_src_stat
  delegate_to: localhost
  become: false

- name: Compute checksum of Prefect flow code (for idempotent sync)
  ansible.builtin.shell: |
    cd "{{ playbook_dir }}/../.." && find prefect -type f ! -path 'prefect/__pycache__/*' ! -name '*.pyc' | sort | xargs sha256sum 2>/dev/null | sha256sum | awk '{print $1}'
  register: prefect_flow_code_checksum_cmd
  delegate_to: localhost
  become: false
  changed_when: false
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Stat stored flow code checksum on server
  ansible.builtin.stat:
    path: /opt/iac/prefect/.flow-code.checksum
  register: _prefect_flow_code_checksum_file
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Get stored flow code checksum on server
  ansible.builtin.slurp:
    src: /opt/iac/prefect/.flow-code.checksum
  register: _prefect_flow_code_checksum_stored
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir and _prefect_flow_code_checksum_file.stat.exists | default(false)

- name: Set fact when flow code sync is needed
  ansible.builtin.set_fact:
    prefect_flow_code_sync_needed: "{{ not (_prefect_flow_code_checksum_file.stat.exists | default(false)) or (_prefect_flow_code_checksum_stored.content | default('') | b64decode | trim) != (prefect_flow_code_checksum_cmd.stdout | default('') | trim) }}"
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Copy Prefect flow code from IaC repo to host
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../prefect/"
    dest: "{{ prefect_flow_code_host_path }}/"
    delete: true
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=.git"
      - "--checksum"
      - "--omit-dir-times"
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir and prefect_flow_code_sync_needed | default(true) | bool

- name: Record flow code checksum after sync
  ansible.builtin.copy:
    content: "{{ prefect_flow_code_checksum_cmd.stdout }}"
    dest: /opt/iac/prefect/.flow-code.checksum
    mode: '0644'
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir and prefect_flow_code_sync_needed | default(true) | bool

- name: Fix ownership of Prefect subtree (sync runs as ubuntu; design is root-owned)
  ansible.builtin.file:
    path: /opt/iac/prefect
    state: directory
    recurse: true
    owner: root
    group: root
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir


- name: Ensure Prefect .ssh directory exists (flow-only keys, e.g. Storage Box)
  ansible.builtin.file:
    path: /opt/iac/prefect/.ssh
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Get checksum of Dockerfile.worker (triggers rebuild when it changes)
  ansible.builtin.stat:
    path: "{{ prefect_flow_code_host_path }}/Dockerfile.worker"
    checksum_algorithm: sha256
  register: prefect_dockerfile_stat
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Check if previous worker image build checksum exists
  ansible.builtin.stat:
    path: /opt/iac/prefect/.worker-image.checksum
  register: prefect_worker_checksum_file_stat
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Read previous worker image build checksum
  ansible.builtin.slurp:
    src: /opt/iac/prefect/.worker-image.checksum
  register: prefect_worker_checksum_prev
  when: prefect_worker_checksum_file_stat.stat is defined and prefect_worker_checksum_file_stat.stat.exists

- name: Set fact when worker image needs rebuild (Dockerfile changed or no previous checksum)
  ansible.builtin.set_fact:
    prefect_worker_rebuild: "{{ prefect_worker_checksum_prev is skipped or (prefect_worker_checksum_prev.content | default('') | b64decode | trim) != (prefect_dockerfile_stat.stat.checksum) }}"
  when: prefect_dockerfile_stat.stat is defined

- name: Build Prefect worker image
  community.docker.docker_image:
    name: "{{ prefect_worker_image }}"
    source: build
    force_source: "{{ prefect_worker_rebuild | default(true) }}"
    build:
      path: "{{ prefect_flow_code_host_path }}"
      dockerfile: Dockerfile.worker
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Record worker image build checksum after rebuild
  ansible.builtin.copy:
    content: "{{ prefect_dockerfile_stat.stat.checksum }}"
    dest: /opt/iac/prefect/.worker-image.checksum
    mode: '0644'
  when:
    - prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir
    - prefect_worker_rebuild | default(true) | bool
    - prefect_dockerfile_stat.stat.checksum is defined

- name: Ensure Prefect network exists
  community.docker.docker_network:
    name: prefect-network
    driver: bridge
    state: present

- name: Ensure Prefect base directory exists
  ansible.builtin.file:
    path: /opt/iac/prefect
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure Prefect DB password file exists on host (create if missing)
  ansible.builtin.shell: |
    if [ ! -f /opt/iac/prefect/.prefect-db-password ]; then
      openssl rand -hex 16 > /opt/iac/prefect/.prefect-db-password
      chmod 600 /opt/iac/prefect/.prefect-db-password
    fi
  changed_when: false

- name: Read Prefect DB password
  ansible.builtin.slurp:
    src: /opt/iac/prefect/.prefect-db-password
  register: _prefect_db_password_slurp

- name: Set Prefect DB password fact
  ansible.builtin.set_fact:
    _prefect_db_password: "{{ (_prefect_db_password_slurp.content | b64decode) | trim }}"
  no_log: true

- name: Ensure Prefect Postgres container is running
  community.docker.docker_container:
    name: prefect-db
    image: postgres:16-alpine
    state: started
    restart_policy: unless-stopped
    env:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: "{{ _prefect_db_password }}"
      POSTGRES_DB: prefect
    volumes:
      - prefect-db-data:/var/lib/postgresql/data
    networks:
      - name: prefect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  no_log: true

- name: Wait for Prefect DB (pg_isready)
  ansible.builtin.command:
    cmd: docker exec prefect-db pg_isready -U prefect
  register: _prefect_db_ready
  until: _prefect_db_ready.rc == 0
  retries: 12
  delay: 5
  changed_when: false

- name: Ensure Prefect server container is running
  community.docker.docker_container:
    name: prefect-server
    image: prefecthq/prefect:3-python3.11
    state: started
    restart_policy: unless-stopped
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
    command: prefect server start --host 0.0.0.0
    env:
      PREFECT_HOME: /data
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect:{{ _prefect_db_password }}@prefect-db:5432/prefect"
      PREFECT_UI_API_URL: "http://127.0.0.1:{{ prefect_server_port }}/api"
    ports:
      - "127.0.0.1:{{ prefect_server_port }}:4200"
    volumes:
      - prefect-server-data:/data
    networks:
      - name: prefect-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
  no_log: true

- name: Wait for Prefect server API to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ prefect_server_port }}/api/health"
    method: GET
    status_code: [200, 401]
    timeout: 5
  register: prefect_health
  until: prefect_health.status in [200, 401]
  retries: 12
  delay: 5

- name: Ensure Prefect worker container is running
  community.docker.docker_container:
    name: prefect-worker
    image: "{{ prefect_worker_image }}"
    state: started
    restart_policy: unless-stopped
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
    command: prefect worker start --pool host-pool
    env:
      PREFECT_API_URL: "http://prefect-server:4200/api"
      REGISTRY_URL: "registry.{{ infrastructure_secrets.base_domain }}"
      DOCKER_CONFIG: "/opt/iac/.docker"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/opt/iac:/opt/iac"
    working_dir: /opt/iac/prefect/flows
    networks:
      - name: prefect-network
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Ensure Prefect work pool host-pool exists
  ansible.builtin.shell: |
    docker run --rm \
      --network prefect-network \
      -e PREFECT_API_URL=http://prefect-server:4200/api \
      -e DOCKER_CONFIG=/opt/iac/.docker \
      -v /opt/iac:/opt/iac \
      -w /opt/iac/prefect/flows \
      {{ prefect_worker_image }} \
      prefect work-pool create host-pool --type process 2>&1
  register: prefect_work_pool
  changed_when: false
  failed_when: false
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir

- name: Register Prefect deployments
  ansible.builtin.shell: |
    docker run --rm \
      --network prefect-network \
      -e PREFECT_API_URL=http://prefect-server:4200/api \
      -e DOCKER_CONFIG=/opt/iac/.docker \
      -v /opt/iac:/opt/iac \
      -w /opt/iac/prefect/flows \
      {{ prefect_worker_image }} \
      prefect deploy --all 2>&1
  register: prefect_register
  changed_when: false
  failed_when: (prefect_register.rc != 0) and ('successfully created' not in (prefect_register.stdout | default('')))
  when: prefect_src_stat.stat.exists and prefect_src_stat.stat.isdir
