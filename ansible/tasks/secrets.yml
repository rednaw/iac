---
# Decrypt and load infrastructure secrets from SOPS-encrypted iac.yml in the app repo
#
# Variables:
#   secrets_file (optional): Path to the secrets file. Default: repo_root/app/.iac/iac.yml
#   (repo_root = playbook_dir/.. when playbook is in ansible/, playbook_dir/../.. when in playbooks/)

- name: Set repo root for secrets path
  ansible.builtin.set_fact:
    _repo_root: "{{ playbook_dir + '/../..' if (playbook_dir | regex_search('playbooks$')) else playbook_dir + '/..' }}"

- name: Set secrets path
  ansible.builtin.set_fact:
    _secrets_file: "{{ secrets_file | default(_repo_root + '/app/.iac/iac.yml') }}"

- name: Check that secrets file exists
  ansible.builtin.stat:
    path: "{{ _secrets_file }}"
  register: _secrets_file_stat
  delegate_to: localhost
  become: false

- name: Fail if secrets file is missing
  ansible.builtin.fail:
    msg: "Secrets file not found: {{ _secrets_file }}. Check app/.iac/iac.yml exists or set secrets_file."
  when: not _secrets_file_stat.stat.exists

- name: Decrypt secrets
  ansible.builtin.shell: |
    SOPS_AGE_KEY_FILE={{ lookup('env', 'HOME') }}/.config/sops/age/keys.txt \
    sops -d --input-type yaml --output-type yaml {{ _secrets_file }}
  delegate_to: localhost
  become: false
  register: decrypted_secrets
  changed_when: false
  run_once: true
  no_log: true
  # noqa: run-once[task]  # Only needs to decrypt once (delegated to localhost)

- name: Load secrets
  ansible.builtin.set_fact:
    infrastructure_secrets: "{{ decrypted_secrets.stdout | from_yaml }}"
  run_once: true
  no_log: true
  # noqa: run-once[task]  # Facts are shared across hosts, only needs to run once

