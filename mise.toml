# Tool versions for IaC development (devcontainer and CI)
# https://mise.jdx.dev/
#
# Renovate: Every [tools] line MUST end with `# github-org/repo`. Updates use
# custom.regex only (native Renovate mise manager is disabled — see renovate.json).

[tools]
terraform = "1.15.6"  # hashicorp/terraform
sops = "3.13.1"  # getsops/sops
age         = "1.3.1"     # FiloSottile/age
yq = "4.53.3"  # mikefarah/yq
task = "3.51.1"  # go-task/task
crane = "0.21.7"  # google/go-containerregistry
github-cli = "2.95.0"  # cli/cli
hcloud = "1.65.0"  # hetznercloud/cli
tfsec       = "1.28.14"   # aquasecurity/tfsec
trivy = "0.71.2"  # aquasecurity/trivy
shellcheck  = "0.11.0"    # koalaman/shellcheck
restic = "0.19.0"  # restic/restic
