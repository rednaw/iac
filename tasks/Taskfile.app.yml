# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Application deployment tasks — run from IAC devcontainer.
# App working copies live at apps/<name>/ (inside the IaC repo; often Git submodules).
# Each app's .iac/ directory is its platform contract:
#   apps/<name>/.iac/iac.yml             — image_name, app_domains
#   apps/<name>/.iac/.env                — SOPS-encrypted app secrets
#   apps/<name>/.iac/docker-compose.yml — full compose for platform deploy (Traefik, services)
#
#   task app:deploy     -- <env> <app> <sha>
#   task app:versions   -- <env> <app>
#   task app:delete-tag -- <app> <tag>      # one-time: remove a tag from the registry (e.g. latest)
#
# See docs/application-deployment.md.

version: '3'

vars:
  IAC_ROOT:
    sh: realpath "{{.TASKFILE_DIR}}/.."
  APPS_ROOT: /workspaces/iac/apps

tasks:
  deploy:
    desc: "Deploy application (use: task app:deploy -- <env> <app> <sha>)"
    silent: true
    vars:
      WORKSPACE:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $1}'
      APP:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $2}'
      SHA:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $3}'
      APP_ROOT: '{{.APPS_ROOT}}/{{.APP}}'
    deps: [":_check:workspace"]
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 3 ]'
        msg: "Usage: task app:deploy -- <env> <app> <sha>"
    cmds:
      - task: ":_check:app"
        vars: { APP: '{{.APP}}' }
      - |
        for f in .iac/iac.yml .iac/.env .iac/docker-compose.yml; do
          if [ ! -f "{{.APP_ROOT}}/$f" ]; then
            echo "App missing {{.APP_ROOT}}/$f. Create the .iac/ contract; see docs/new-project.md." >&2
            exit 1
          fi
        done

        _iac="{{.APP_ROOT}}/.iac/iac.yml"
        _forbidden_keys="base_domain hcloud_token terraform_cloud_organization terraform_cloud_token ssh_keys allowed_ssh_ips transip_account_name transip_private_key registry_username registry_password registry_http_secret openobserve_username openobserve_password abuseipdb_api_key server_type"
        for k in $_forbidden_keys; do
          if [ "$(yq "has(\"$k\")" "$_iac")" = "true" ]; then
            echo "Forbidden infrastructure key \"$k\" in $_iac — move it to secrets/infra.yml (fork). See docs/future/secrets-and-mounts.md." >&2
            exit 1
          fi
        done

        IMAGE_NAME=$(yq -r '.image_name' "$_iac")

        HOSTNAME=$(task hostkeys:hostname -- "{{.WORKSPACE}}")
        PLATFORM=$(task hostkeys:platform)
        ANSIBLE_CONFIG="{{.IAC_ROOT}}/ansible/ansible.cfg" \
        ansible-playbook \
          -i "${PLATFORM}-{{.WORKSPACE}}," \
          "{{.IAC_ROOT}}/ansible/playbooks/deploy-app.yml" \
          -e "ansible_host=${HOSTNAME}" \
          -e "app_root={{.APP_ROOT}}" \
          -e "workspace={{.WORKSPACE}}" \
          -e "sha={{.SHA}}" \
          -e "registry_name=${REGISTRY}" \
          -e "image_name=$IMAGE_NAME"

  versions:
    desc: "List available versions (use: task app:versions -- <env> <app>)"
    silent: true
    vars:
      WORKSPACE:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $1}'
      APP:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $2}'
      APP_ROOT: '{{.APPS_ROOT}}/{{.APP}}'
    deps: [":_check:workspace"]
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 2 ]'
        msg: "Usage: task app:versions -- <env> <app>\nExample: task app:versions -- dev myapp"
    cmds:
      - task: ":_check:app"
        vars: { APP: '{{.APP}}' }
      - |
        IMAGE_NAME=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        APP_SLUG="${IMAGE_NAME##*/}"
        cd "{{.IAC_ROOT}}" && python3 scripts/application_versions.py "{{.WORKSPACE}}" "$REGISTRY" "$IMAGE_NAME" "$APP_SLUG"

  delete-tag:
    desc: "Remove a tag from the app image in the registry (one-time, e.g. task app:delete-tag -- myapp latest)"
    silent: true
    vars:
      APP:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $1}'
      TAG:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $2}'
      APP_ROOT: '{{.APPS_ROOT}}/{{.APP}}'
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 2 ]'
        msg: "Usage: task app:delete-tag -- <app> <tag>\nExample: task app:delete-tag -- myapp latest"
    cmds:
      - task: ":_check:app"
        vars: { APP: '{{.APP}}' }
      - |
        IMAGE_NAME=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        REF="${REGISTRY}/${IMAGE_NAME}:{{.TAG}}"
        echo "Deleting tag {{.TAG}} from registry (${REF})..."
        crane delete "$REF"
        echo "Done."
