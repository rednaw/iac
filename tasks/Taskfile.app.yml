# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Application deployment tasks — run from IAC devcontainer.
# App contract is mounted at /workspaces/iac/app via APP_HOST_PATH:
#   app/.iac/          — platform config and secrets (read/write)
#   app/docker-compose.yml  — generic stack (readonly)
#   app/.github/workflows/build-and-push.yml — CI caller (read/write)
#
#   task app:deploy   -- <env> <sha>
#   task app:versions -- <env>
#
# See docs/application-deployment.md.

version: '3'

vars:
  IAC_ROOT:
    sh: realpath "{{.TASKFILE_DIR}}/.."
  APP_ROOT: /workspaces/iac/app

tasks:
  deploy:
    desc: "Deploy application (use: task app:deploy -- <environment> <sha>)"
    silent: true
    vars:
      WORKSPACE:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $1}'
      SHA:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $2}'
    deps: [":_check:workspace"]
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 2 ]'
        msg: "Usage: task app:deploy -- <environment> <sha>"
      - sh: test -d "{{.APP_ROOT}}"
        msg: "App not mounted at {{.APP_ROOT}}. Run ./scripts/setup-app-path.sh /path/to/app and reopen the devcontainer."
      - sh: test -f "{{.APP_ROOT}}/.iac/iac.yml"
        msg: "App missing .iac/iac.yml. Run task platform:init inside the devcontainer."
      - sh: test -f "{{.APP_ROOT}}/.iac/.env"
        msg: "App missing .iac/.env. Run task platform:init inside the devcontainer."
      - sh: test -f "{{.APP_ROOT}}/.iac/docker-compose.override.yml"
        msg: "App missing .iac/docker-compose.override.yml. Run task platform:init inside the devcontainer."
      - sh: test -f "{{.APP_ROOT}}/docker-compose.yml"
        msg: "App missing docker-compose.yml."
    cmds:
      - |
        IMAGE_NAME=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")

        HOSTNAME=$(task hostkeys:hostname -- "{{.WORKSPACE}}")
        ANSIBLE_CONFIG="{{.IAC_ROOT}}/ansible/ansible.cfg" \
        ansible-playbook \
          -i "${HOSTNAME}," \
          "{{.IAC_ROOT}}/ansible/playbooks/deploy-app.yml" \
          -e "app_root={{.APP_ROOT}}" \
          -e "workspace={{.WORKSPACE}}" \
          -e "sha={{.SHA}}" \
          -e "registry_name=${REGISTRY}" \
          -e "image_name=$IMAGE_NAME"

  versions:
    desc: "List available versions (use: task app:versions -- <environment>)"
    silent: true
    vars:
      WORKSPACE: "{{.CLI_ARGS}}"
    deps: [":_check:workspace"]
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 1 ]'
        msg: "Usage: task app:versions -- <environment>\nExample: task app:versions -- dev"
      - sh: test -d "{{.APP_ROOT}}"
        msg: "App not mounted at {{.APP_ROOT}}. Run ./scripts/setup-app-path.sh /path/to/app and reopen the devcontainer."
      - sh: test -f "{{.APP_ROOT}}/.iac/iac.yml"
        msg: "App missing .iac/iac.yml. Run task platform:init inside the devcontainer."
    cmds:
      - |
        IMAGE_NAME=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        APP_SLUG="${IMAGE_NAME##*/}"
        cd "{{.IAC_ROOT}}" && python3 scripts/application_versions.py "{{.WORKSPACE}}" "$REGISTRY" "$IMAGE_NAME" "$APP_SLUG"
