# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Backup: slug from apps/<app>/.iac/iac.yml; SSH + docker run prefect-worker on server.
# CLI_ARGS → first word = SSH host (dev|prod), second = app name.
#   restore  passes further args to restore_from_backup.py.
# download: server → .backup-repos/<slug>/ via docker tar (host dir often root-only).
# upload:   .backup-repos/<slug>/ → server (clears remote repo dir first, then tar extract; idle backups only).

vars:
  APPS_ROOT: /workspaces/iac/apps
  IAC_ROOT:
    sh: realpath "{{.TASKFILE_DIR}}/.."

tasks:
  _check:app-backup-contract:
    desc: "(internal) Backup contract files exist for the app"
    internal: true
    requires:
      vars: [APP]
    preconditions:
      - sh: test -f "{{.APPS_ROOT}}/{{.APP}}/.iac/backup.yml"
        msg: "Missing {{.APPS_ROOT}}/{{.APP}}/.iac/backup.yml (Restic contract). See docs/backups.md"

  restore:
    desc: "Restic restore for an app. Use: task backup:restore -- <dev|prod> <app> [snapshot] [--confirm|...]"
    deps: [":_check:workspace"]
    silent: true
    vars:
      WORKSPACE:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $1}'
      APP:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $2}'
      APP_ROOT: '{{.APPS_ROOT}}/{{.APP}}'
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -ge 2 ]'
        msg: "Usage: task backup:restore -- <dev|prod> <app> [snapshot] [--confirm|...]"
    cmds:
      - task: ":_check:app"
        vars: { APP: '{{.APP}}' }
      - task: _check:app-backup-contract
        vars: { APP: '{{.APP}}' }
      - |
        set -eu

        image_name=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        slug="${image_name##*/}"

        set -- {{.CLI_ARGS | join " "}}
        ssh_host=$1
        shift 2  # drop env + app, leave any extra args for the python script

        py_args=$(bash -c 'printf "%q " "$@"' _ "$slug" "$@")
        py_args=${py_args%% }

        ssh -t "$ssh_host" "docker run --rm -i \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /opt/iac:/opt/iac \
          -w /opt/iac/prefect/flows/backup \
          prefect-worker \
          python3 restore_from_backup.py ${py_args}"

  snapshots:
    desc: "List local Restic snapshots for an app. Use: task backup:snapshots -- <dev|prod> <app>"
    deps: [":_check:workspace"]
    silent: true
    vars:
      APP:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $2}'
      APP_ROOT: '{{.APPS_ROOT}}/{{.APP}}'
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 2 ]'
        msg: "Usage: task backup:snapshots -- <dev|prod> <app>"
    cmds:
      - task: ":_check:app"
        vars: { APP: '{{.APP}}' }
      - |
        set -eu

        image_name=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        slug="${image_name##*/}"

        set -- {{.CLI_ARGS | join " "}}
        ssh_host=$1

        ssh "$ssh_host" docker run --rm \
          -v "/opt/iac/prefect/backups/${slug}:/repo:ro" \
          -e RESTIC_REPOSITORY=/repo \
          -e RESTIC_PASSWORD=local \
          prefect-worker \
          restic --no-lock snapshots

  download:
    desc: "Copy server's local Restic repo to .backup-repos/<slug>/. Use: task backup:download -- <dev|prod> <app>"
    deps: [":_check:workspace"]
    silent: true
    vars:
      APP:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $2}'
      APP_ROOT: '{{.APPS_ROOT}}/{{.APP}}'
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 2 ]'
        msg: "Usage: task backup:download -- <dev|prod> <app>"
    cmds:
      - task: ":_check:app"
        vars: { APP: '{{.APP}}' }
      - |
        set -eu
        image_name=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        slug="${image_name##*/}"
        set -- {{.CLI_ARGS | join " "}}
        ssh_host=$1
        dest="{{.IAC_ROOT}}/.backup-repos/${slug}"
        mkdir -p "$dest"
        # shellcheck disable=SC2029
        ssh "$ssh_host" "docker run --rm -v /opt/iac/prefect/backups/${slug}:/repo:ro prefect-worker tar -c -f - -C /repo ." \
          | tar -xf - -C "$dest"

  upload:
    desc: "Replace server's local Restic repo from .backup-repos/<slug>/. Use: task backup:upload -- <dev|prod> <app>"
    deps: [":_check:workspace"]
    silent: true
    vars:
      APP:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $2}'
      APP_ROOT: '{{.APPS_ROOT}}/{{.APP}}'
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 2 ]'
        msg: "Usage: task backup:upload -- <dev|prod> <app>"
    cmds:
      - task: ":_check:app"
        vars: { APP: '{{.APP}}' }
      - |
        set -eu
        image_name=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        slug="${image_name##*/}"
        set -- {{.CLI_ARGS | join " "}}
        ssh_host=$1
        src="{{.IAC_ROOT}}/.backup-repos/${slug}"
        test -f "${src}/config" || {
          echo "Missing Restic repo at ${src}/config (run task backup:download first)." >&2
          exit 1
        }
        # shellcheck disable=SC2029
        tar -c -C "$src" . | ssh "$ssh_host" "docker run --rm -i -v /opt/iac/prefect/backups/${slug}:/repo prefect-worker sh -c 'find /repo -mindepth 1 -delete; tar -xf - -C /repo'"
