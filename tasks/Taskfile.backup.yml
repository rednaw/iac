# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Backup: slug from mounted app/.iac/iac.yml; SSH + docker run prefect-worker on server.
# CLI_ARGS → first word = SSH host; remainder → restore_from_backup.py only.

vars:
  APP_ROOT: /workspaces/iac/app

tasks:
  _check:app-mount:
    desc: "(internal) Mounted app + iac.yml + backup.yml"
    internal: true
    preconditions:
      - sh: test -d "{{.APP_ROOT}}"
        msg: "App not mounted at {{.APP_ROOT}}. See docs/application-deployment.md#app-mount"
      - sh: test -f "{{.APP_ROOT}}/.iac/iac.yml"
        msg: "Missing {{.APP_ROOT}}/.iac/iac.yml"
      - sh: test -f "{{.APP_ROOT}}/.iac/backup.yml"
        msg: "Missing {{.APP_ROOT}}/.iac/backup.yml (Restic contract). See docs/backups.md"

  restore:
    desc: "Restic restore for mounted app. Use: task backup:restore -- <dev|prod> [snapshot] [--confirm|...]"
    deps: [":_check:workspace", "_check:app-mount"]
    silent: true
    cmds:
      - |
        set -eu

        image_name=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        slug="${image_name##*/}"

        set -- {{.CLI_ARGS | join " "}}
        ssh_host=$1
        shift

        py_args=$(bash -c 'printf "%q " "$@"' _ "$slug" "$@")
        py_args=${py_args%% }

        ssh -t "$ssh_host" "docker run --rm -i \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /opt/iac:/opt/iac \
          -w /opt/iac/prefect/flows/backup \
          prefect-worker \
          python3 restore_from_backup.py ${py_args}"

  snapshots:
    desc: "List local Restic snapshots for mounted app. Use: task backup:snapshots -- <dev|prod>"
    deps: [":_check:workspace", "_check:app-mount"]
    silent: true
    cmds:
      - |
        set -eu

        image_name=$(yq -r '.image_name' "{{.APP_ROOT}}/.iac/iac.yml")
        slug="${image_name##*/}"

        set -- {{.CLI_ARGS | join " "}}
        ssh_host=$1

        ssh "$ssh_host" docker run --rm \
          -v "/opt/iac/prefect/backups/${slug}:/repo:ro" \
          -e RESTIC_REPOSITORY=/repo \
          -e RESTIC_PASSWORD=local \
          prefect-worker \
          restic --no-lock snapshots
