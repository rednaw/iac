# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Secrets management - key generation and SOPS configuration
#
# With VS Code SOPS extension installed, encrypted files are edited transparently.
# No manual encrypt/decrypt needed.
#
version: '3'

vars:
  IAC_ROOT:
    sh: realpath "{{.TASKFILE_DIR}}/.."
  APP_IAC_DIR: '{{.IAC_ROOT}}/app/.iac'
  SOPS_CONFIG_DIR: '{{.HOME}}/.config/sops/age'
  SOPS_KEY_FILE: '{{.SOPS_CONFIG_DIR}}/keys.txt'
  SOPS_KEY_PUB: '{{.APP_IAC_DIR}}/sops-key-{{.USERNAME}}.pub'
  RECIPIENTS:
    sh: |
      DIR="{{.APP_IAC_DIR}}"
      for pub in "$DIR"/sops-key-*.pub; do
        if [ -f "$pub" ]; then cat "$pub" | tr -d '\n'; echo ","; fi
      done | tr -d '\n' | sed 's/,$//'

tasks:
  keygen:
    desc: Generate age key pair for SOPS encryption
    silent: true
    cmds:
      - |
        mkdir -p "{{.SOPS_CONFIG_DIR}}"
        chmod 700 "{{.SOPS_CONFIG_DIR}}"

        PRIV_KEY="{{.SOPS_KEY_FILE}}"
        PUB_KEY="{{.SOPS_KEY_PUB}}"

        if [ -f "$PRIV_KEY" ] && [ -f "$PUB_KEY" ]; then
          echo "✅ Key pair ready for {{.USERNAME}}"
          exit 0
        fi

        [ -e "$PRIV_KEY" ] && rm -f "$PRIV_KEY"

        mkdir -p "$(dirname "$PUB_KEY")"
        echo "🔑 Generating age key pair for {{.USERNAME}}..."
        age-keygen -o "$PRIV_KEY"
        chmod 600 "$PRIV_KEY"
        age-keygen -y "$PRIV_KEY" > "$PUB_KEY"

        echo ""
        echo "✅ Key pair generated!"
        echo "   🔒 Private: $PRIV_KEY"
        echo "   📝 Public:  $PUB_KEY"
        echo ""
        echo "Next: commit $PUB_KEY to the app repo, then run: task secrets:generate-sops-config"

  generate-sops-config:
    desc: Generate app/.iac/.sops.yaml from public keys in app/.iac/
    silent: true
    cmds:
      - |
        echo "🔧 Generating app/.iac/.sops.yaml from public keys..."
        cat > "{{.APP_IAC_DIR}}/.sops.yaml" << EOF
        creation_rules:
          - path_regex: iac\.yml$
            age: {{.RECIPIENTS}}
            unencrypted_regex: "^(image_name|app_domains)$"
          - path_regex: \.env$
            age: {{.RECIPIENTS}}
        EOF
        echo "✅ Generated app/.iac/.sops.yaml"
        echo ""
        echo "Next: commit app/.iac/.sops.yaml to the app repo."
