# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Secrets management — key generation and SOPS configuration.
#
# Fork-local secrets directory:
#   secrets/                  — committed in fork, gitignored upstream
#     infra.yml               — SOPS-encrypted infra config (org-wide)
#     .sops.yaml              — encryption rules for infra.yml
#     sops-key-<name>.pub     — age public keys (recipients for infra + app .env)
#
# apps/<app>/.iac/.sops.yaml — same recipients; refresh via task secrets:generate-app-env-sops-config / sync-all-app-env-sops-configs
#
# With VS Code SOPS extension installed, encrypted files are edited transparently.
version: '3'

vars:
  IAC_ROOT:
    sh: realpath "{{.TASKFILE_DIR}}/.."
  SECRETS_DIR: '{{.IAC_ROOT}}/secrets'
  SOPS_CONFIG_DIR: '{{.HOME}}/.config/sops/age'
  SOPS_KEY_FILE: '{{.SOPS_CONFIG_DIR}}/keys.txt'
  SOPS_KEY_PUB: '{{.SECRETS_DIR}}/sops-key-{{.USERNAME}}.pub'

tasks:
  keygen:
    desc: Generate age key pair for SOPS encryption
    silent: true
    cmds:
      - |
        set -eu
        mkdir -p "{{.SOPS_CONFIG_DIR}}"
        chmod 700 "{{.SOPS_CONFIG_DIR}}"
        mkdir -p "{{.SECRETS_DIR}}"

        PRIV_KEY="{{.SOPS_KEY_FILE}}"
        PUB_KEY="{{.SOPS_KEY_PUB}}"

        # Invariant: NEVER delete an existing private key. The host SOPS key is
        # bind-mounted into the devcontainer; deleting it would orphan every file
        # ever encrypted with that key (across every project on the host).

        if [ -f "$PRIV_KEY" ]; then
          derived=$(age-keygen -y "$PRIV_KEY" 2>/dev/null || true)
          if [ -z "$derived" ]; then
            echo "❌ $PRIV_KEY exists but is unreadable / not a valid age key." >&2
            echo "   Refusing to overwrite. Investigate manually." >&2
            exit 1
          fi

          # Already match-committed → done.
          for pub in "{{.SECRETS_DIR}}"/sops-key-*.pub; do
            [ -f "$pub" ] || continue
            if [ "$(tr -d '[:space:]' < "$pub")" = "$derived" ]; then
              echo "✅ Existing key matches $(basename "$pub") — ready."
              exit 0
            fi
          done

          # Private key exists but no committed pub matches. Most likely the
          # devcontainer was opened on a host with a pre-existing key that was
          # never registered under {{.USERNAME}}. Write the username-named pub
          # from the actual private key so the user can commit it & be added as
          # a recipient. NEVER touch the private key.
          if [ -f "$PUB_KEY" ] && [ "$(tr -d '[:space:]' < "$PUB_KEY")" != "$derived" ]; then
            echo "❌ Mismatch:" >&2
            echo "   $PRIV_KEY derives to:    $derived" >&2
            echo "   $PUB_KEY contains:       $(cat "$PUB_KEY")" >&2
            echo "   Refusing to overwrite either. Resolve manually." >&2
            exit 1
          fi
          echo "$derived" > "$PUB_KEY"
          echo "ℹ️  Existing private key was not registered. Wrote $PUB_KEY."
          echo "   Next: commit $PUB_KEY, ask a key-holder to add you to secrets/.sops.yaml,"
          echo "   then re-encrypt secrets/infra.yml so you become a recipient."
          exit 0
        fi

        echo "🔑 Generating age key pair for {{.USERNAME}}..."
        age-keygen -o "$PRIV_KEY"
        chmod 600 "$PRIV_KEY"
        age-keygen -y "$PRIV_KEY" > "$PUB_KEY"

        echo ""
        echo "✅ Key pair generated!"
        echo "   🔒 Private: $PRIV_KEY"
        echo "   📝 Public:  $PUB_KEY"
        echo ""
        echo "Next: commit $PUB_KEY to the fork, then run: task secrets:generate-sops-config"
        echo "     Then per app: task secrets:generate-app-env-sops-config -- <app>"

  generate-sops-config:
    desc: Generate secrets/.sops.yaml from public keys in secrets/
    silent: true
    cmds:
      - |
        if ! ls "{{.SECRETS_DIR}}"/sops-key-*.pub >/dev/null 2>&1; then
          echo "❌ No public keys found in {{.SECRETS_DIR}}/sops-key-*.pub" >&2
          echo "   Run 'task secrets:keygen' first." >&2
          exit 1
        fi
        recipients=""
        for pub in "{{.SECRETS_DIR}}"/sops-key-*.pub; do
          if [ -f "$pub" ]; then
            recipients="${recipients}$(tr -d '\n' < "$pub"),"
          fi
        done
        recipients="${recipients%,}"
        echo "🔧 Generating secrets/.sops.yaml from public keys..."
        cat > "{{.SECRETS_DIR}}/.sops.yaml" << EOF
        creation_rules:
          - path_regex: infra\.yml$
            age: ${recipients}
        EOF
        echo "✅ Generated secrets/.sops.yaml"
        echo "ℹ️  Regenerate app dotenv rules after changing keys: task secrets:sync-all-app-env-sops-configs"

  generate-app-env-sops-config:
    desc: "Write apps/<app>/.iac/.sops.yaml using the same age recipients as secrets/ (use: task secrets:generate-app-env-sops-config -- <app>)"
    silent: true
    vars:
      APP_SLUG:
        sh: echo "{{.CLI_ARGS}}" | awk '{print $1}'
    preconditions:
      - sh: '[ $(echo "{{.CLI_ARGS}}" | wc -w | tr -d " ") -eq 1 ]'
        msg: "Usage: task secrets:generate-app-env-sops-config -- <app>"
    cmds:
      - task: ":_check:app"
        vars: { APP: '{{.APP_SLUG}}' }
      - |
        set -eu
        APP="{{.APP_SLUG}}"
        APP_IAC="{{.IAC_ROOT}}/apps/${APP}/.iac"
        SDIR="{{.SECRETS_DIR}}"
        if ! ls "$SDIR"/sops-key-*.pub >/dev/null 2>&1; then
          echo "❌ No public keys in $SDIR/sops-key-*.pub" >&2
          echo "   Run task secrets:keygen and commit pub keys, then task secrets:generate-sops-config." >&2
          exit 1
        fi
        recipients=""
        for pub in "$SDIR"/sops-key-*.pub; do
          if [ -f "$pub" ]; then
            recipients="${recipients}$(tr -d '\n' < "$pub"),"
          fi
        done
        recipients="${recipients%,}"
        mkdir -p "$APP_IAC"
        echo "🔧 Writing ${APP_IAC}/.sops.yaml (recipients match secrets/)..."
        cat > "$APP_IAC/.sops.yaml" << EOF
        creation_rules:
          - path_regex: \\.env$
            age: ${recipients}
        EOF
        echo "✅ ${APP_IAC}/.sops.yaml"

  sync-all-app-env-sops-configs:
    desc: Regenerate apps/*/.iac/.sops.yaml from secrets/sops-key-*.pub for each app under apps/
    silent: true
    cmds:
      - |
        set -eu
        APPS_ROOT="{{.IAC_ROOT}}/apps"
        if [ ! -d "$APPS_ROOT" ]; then
          echo "ℹ️  No apps/ directory — nothing to do."
          exit 0
        fi
        found=0
        for d in "$APPS_ROOT"/*/; do
          [ -d "$d" ] || continue
          [ -d "${d}.iac" ] || continue
          app=$(basename "$d")
          found=1
          task secrets:generate-app-env-sops-config -- "$app"
        done
        if [ "$found" -eq 0 ]; then
          echo "ℹ️  No apps/*/ with .iac/ — nothing to do."
        fi

  init:
    desc: "(first-time setup) Generate age key, write template secrets/infra.yml, encrypt"
    silent: true
    cmds:
      - |
        set -eu

        if [ -f "{{.SECRETS_DIR}}/infra.yml" ]; then
          echo "❌ {{.SECRETS_DIR}}/infra.yml already exists. Refusing to overwrite." >&2
          echo "   Edit it directly (VS Code SOPS extension) or delete it to start over." >&2
          exit 1
        fi

        mkdir -p "{{.SECRETS_DIR}}"

        echo "🔑 Step 1/4: keygen..."
        task secrets:keygen

        echo "🔧 Step 2/4: SOPS config..."
        task secrets:generate-sops-config

        echo "📝 Step 3/4: writing template {{.SECRETS_DIR}}/infra.yml..."
        cat > "{{.SECRETS_DIR}}/infra.yml" <<'YAML'
        # Infrastructure secrets — committed encrypted to the fork.
        # Edit with the VS Code SOPS extension or `sops secrets/infra.yml`.
        #
        # Each server purpose only reads the keys it needs; missing keys are OK.

        # ── Universal (every server purpose) ──────────────────────────────
        base_domain: ""
        hcloud_token: ""
        terraform_cloud_organization: ""
        terraform_cloud_token: ""
        ssh_keys: []
        allowed_ssh_ips: []

        # ── DNS (TransIP) — required if any purpose creates DNS records ──
        transip_account_name: ""
        transip_private_key: ""

        # ── Platform purpose (Traefik + registry + observability) ────────
        # Leave blank to skip platform-specific setup (Docker auth, dev/prod contexts).
        registry_username: ""
        registry_password: ""
        registry_http_secret: ""
        openobserve_username: ""
        openobserve_password: ""
        abuseipdb_api_key: ""

        # ── Future server purposes (vpn, honeypot, …) add their keys below.
        YAML

        echo "🔒 Step 4/4: encrypting in place..."
        ( cd "{{.SECRETS_DIR}}" && SOPS_AGE_KEY_FILE="{{.SOPS_KEY_FILE}}" sops -e -i infra.yml )

        echo ""
        echo "✅ Initialised. Next:"
        echo "   1. Edit {{.SECRETS_DIR}}/infra.yml (with VS Code SOPS extension or 'sops {{.SECRETS_DIR}}/infra.yml')"
        echo "   2. Reload window or run: bash .devcontainer/devcontainer-setup.sh"
        echo ""
        echo "ℹ️  secrets/ is gitignored upstream — in your fork run: git add -f secrets/"
        echo "ℹ️  After adding apps: task secrets:sync-all-app-env-sops-configs"
