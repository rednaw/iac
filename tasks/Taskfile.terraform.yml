# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  init:
    desc: "Initialize Terraform backend (runs automatically; call manually to re-initialize)"
    dir: terraform
    silent: true
    deps: [":_check:sops-key"]
    cmds:
      - |
        TFC_ORG=$(SOPS_AGE_KEY_FILE="{{.SOPS_KEY_FILE}}" sops -d ../app/.iac/iac.yml | yq -r '.terraform_cloud_organization')
        if ! output=$(terraform init -backend-config="organization=${TFC_ORG}" 2>&1); then
          echo "$output"
          exit 1
        fi

  plan:
    desc: "Plan Terraform changes (use: task terraform:plan -- dev or -- prod)"
    dir: terraform
    silent: true
    vars:
      WORKSPACE: "{{.CLI_ARGS}}"
    deps: [":_check:sops-key", ":_check:workspace"]
    cmds:
      - task: init
      - |
        echo "📋 Planning Terraform changes for workspace: platform-{{.WORKSPACE}}..."
        terraform workspace select "{{.WORKSPACE}}"
        SECRETS=$(SOPS_AGE_KEY_FILE="{{.SOPS_KEY_FILE}}" sops -d ../app/.iac/iac.yml)
        TF_VAR_hcloud_token=$(echo "$SECRETS" | yq -r '.hcloud_token')
        TF_VAR_base_domain=$(echo "$SECRETS" | yq -r '.base_domain')
        TF_VAR_ssh_keys=$(echo "$SECRETS" | yq '.ssh_keys' -o=json)
        TF_VAR_allowed_ssh_ips=$(echo "$SECRETS" | yq '.allowed_ssh_ips' -o=json)
        export TF_VAR_hcloud_token TF_VAR_base_domain TF_VAR_ssh_keys TF_VAR_allowed_ssh_ips
        terraform plan

  apply:
    desc: "Apply Terraform changes (use: task terraform:apply -- dev or -- prod)"
    dir: terraform
    silent: true
    vars:
      WORKSPACE: "{{.CLI_ARGS}}"
    deps: [":_check:sops-key", ":_check:workspace"]
    cmds:
      - task: init
      - |
        echo "✨ Applying Terraform changes to workspace: platform-{{.WORKSPACE}}"
        terraform workspace select "{{.WORKSPACE}}"
        SECRETS=$(SOPS_AGE_KEY_FILE="{{.SOPS_KEY_FILE}}" sops -d ../app/.iac/iac.yml)
        TF_VAR_hcloud_token=$(echo "$SECRETS" | yq -r '.hcloud_token')
        TF_VAR_base_domain=$(echo "$SECRETS" | yq -r '.base_domain')
        TF_VAR_ssh_keys=$(echo "$SECRETS" | yq '.ssh_keys' -o=json)
        TF_VAR_allowed_ssh_ips=$(echo "$SECRETS" | yq '.allowed_ssh_ips' -o=json)
        export TF_VAR_hcloud_token TF_VAR_base_domain TF_VAR_ssh_keys TF_VAR_allowed_ssh_ips
        echo "🔑 Removing old host key for workspace from known_hosts..."
        task hostkeys:prepare -- "{{.WORKSPACE}}"
        terraform apply
        echo "🔑 Accepting new host key..."
        HOSTNAME=$(task hostkeys:hostname -- "{{.WORKSPACE}}")
        ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 -o BatchMode=yes "ubuntu@${HOSTNAME}" "echo" >/dev/null 2>&1 || true

  destroy:
    desc: "Destroy Terraform resources (use: task terraform:destroy -- dev or -- prod)"
    dir: terraform
    silent: true
    vars:
      WORKSPACE: "{{.CLI_ARGS}}"
    deps: [":_check:sops-key", ":_check:workspace"]
    cmds:
      - task: init
      - |
        echo "⚠️  WARNING: This will DESTROY all resources in workspace: platform-{{.WORKSPACE}}"
        echo "Terraform will ask for confirmation..."
        echo ""
        terraform workspace select "{{.WORKSPACE}}"
        SECRETS=$(SOPS_AGE_KEY_FILE="{{.SOPS_KEY_FILE}}" sops -d ../app/.iac/iac.yml)
        TF_VAR_hcloud_token=$(echo "$SECRETS" | yq -r '.hcloud_token')
        TF_VAR_base_domain=$(echo "$SECRETS" | yq -r '.base_domain')
        TF_VAR_ssh_keys=$(echo "$SECRETS" | yq '.ssh_keys' -o=json)
        TF_VAR_allowed_ssh_ips=$(echo "$SECRETS" | yq '.allowed_ssh_ips' -o=json)
        export TF_VAR_hcloud_token TF_VAR_base_domain TF_VAR_ssh_keys TF_VAR_allowed_ssh_ips
        terraform destroy
        echo "🧹 Cleaning server host key from known_hosts..."
        task hostkeys:prepare -- "{{.WORKSPACE}}"
        echo "✅ Host key removed"

  output:
    desc: "Show Terraform outputs (use: task terraform:output -- dev or -- prod)"
    dir: terraform
    vars:
      WORKSPACE: "{{.CLI_ARGS}}"
    deps: [":_check:workspace"]
    cmds:
      - task: init
      - |
        terraform workspace select "{{.WORKSPACE}}"
        echo "📤 Getting Terraform outputs for workspace: platform-{{.WORKSPACE}}..."
        terraform output
