# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  run:
    desc: Run all tests (validate, security scan, Ansible lint & syntax, taskfiles)
    silent: true
    cmds:
      - |
        echo "🧪 Running test suite..."
        echo ""
        VALIDATE_RESULT=0
        SECURITY_RESULT=0
        ANSIBLE_LINT_RESULT=0
        ANSIBLE_SYNTAX_RESULT=0
        TASKFILE_RESULT=0
        task test:terraform:validate || VALIDATE_RESULT=$?
        task test:terraform:security || SECURITY_RESULT=$?
        task test:ansible:lint || ANSIBLE_LINT_RESULT=$?
        task test:ansible:syntax || ANSIBLE_SYNTAX_RESULT=$?
        task test:taskfiles || TASKFILE_RESULT=$?
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Test Results:"
        if [ $VALIDATE_RESULT -eq 0 ]; then
          echo "  ✅ Terraform Validation: PASSED"
        else
          echo "  ❌ Terraform Validation: FAILED"
        fi
        if [ $SECURITY_RESULT -eq 0 ]; then
          echo "  ✅ Terraform Security:   PASSED"
        else
          echo "  ❌ Terraform Security:   FAILED"
        fi
        if [ $ANSIBLE_LINT_RESULT -eq 0 ]; then
          echo "  ✅ Ansible Lint:         PASSED"
        else
          echo "  ❌ Ansible Lint:         FAILED"
        fi
        if [ $ANSIBLE_SYNTAX_RESULT -eq 0 ]; then
          echo "  ✅ Ansible Syntax:       PASSED"
        else
          echo "  ❌ Ansible Syntax:       FAILED"
        fi
        if [ $TASKFILE_RESULT -eq 0 ]; then
          echo "  ✅ Taskfiles:            PASSED"
        else
          echo "  ❌ Taskfiles:            FAILED"
        fi
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        if [ $VALIDATE_RESULT -eq 0 ] && [ $SECURITY_RESULT -eq 0 ] && [ $ANSIBLE_LINT_RESULT -eq 0 ] && [ $ANSIBLE_SYNTAX_RESULT -eq 0 ] && [ $TASKFILE_RESULT -eq 0 ]; then
          echo ""
          echo "🎉 All tests passed!"
          exit 0
        else
          echo ""
          echo "❌ Some tests failed"
          exit 1
        fi

  terraform:validate:
    desc: Validate Terraform configuration
    silent: true
    dir: terraform
    cmds:
      - |
        echo "🔍 Validating Terraform configuration..."
        if ! terraform init -backend=false >/dev/null 2>&1; then
          echo "❌ Terraform initialization failed"
          exit 1
        fi
        if ! terraform validate; then
          echo "❌ Terraform validation failed"
          exit 1
        fi
      - echo "✅ Terraform validation passed"

  terraform:security:
    desc: Run Terraform security scan (tfsec)
    dir: terraform
    silent: true
    cmds:
      - |
        echo ""
        echo "🔒 Running security scan with tfsec..."
        tfsec . --minimum-severity MEDIUM || (echo "❌ Security scan found issues" && exit 1)
      - echo "✅ Security scan passed"

  ansible:lint:
    desc: Lint Ansible playbooks (ansible-lint)
    dir: ansible
    silent: true
    cmds:
      - |
        echo ""
        echo "🔍 Linting Ansible playbooks..."
        ansible-lint || (echo "❌ Ansible linting found issues" && exit 1)
      - echo "✅ Ansible linting passed"

  ansible:syntax:
    desc: Validate Ansible playbook syntax
    dir: ansible
    silent: true
    cmds:
      - |
        echo ""
        echo "🔍 Validating Ansible playbook syntax..."
        for playbook in playbooks/*.yml; do
          ansible-playbook --syntax-check "$playbook" -i localhost, 2>/dev/null || (echo "❌ $playbook syntax check failed" && exit 1)
        done
      - echo "✅ Ansible syntax validation passed"

  taskfiles:
    desc: Validate embedded scripts in Taskfiles
    silent: true
    cmds:
      - python3 scripts/validate-taskfiles.py

  trivy:image:
    desc: Run Trivy vulnerability scan on the dev/CI image (MEDIUM+ fail).
    silent: true
    preconditions:
      - sh: '[ -n "${REGISTRY:-}" ]'
        msg: "REGISTRY must be set by devcontainer (from base_domain in secrets)"
    cmds:
      - |
        IMAGE="${IMAGE:-${REGISTRY}/iac/iac-dev:latest}"
        echo "🔒 Running Trivy image scan (severity >= MEDIUM): $IMAGE"
        trivy image --scanners vuln --ignore-unfixed --severity CRITICAL,HIGH,MEDIUM --exit-code 1 "$IMAGE"
      - echo "✅ Trivy image scan passed"
