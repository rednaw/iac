# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# SSH tunnel for admin UIs (Traefik, OpenObserve, Prefect). Run manually when needed.

tasks:
  start:
    desc: "Start SSH tunnel to workspace for admin UIs. Use: task tunnel:start -- dev|prod"
    silent: true
    vars:
      WORKSPACE: "{{.CLI_ARGS}}"
    deps: [":_check:workspace"]
    cmds:
      - |
        HOSTNAME=$(task hostkeys:hostname -- "{{.WORKSPACE}}")
        if pgrep -f "ssh.*-L 57800:localhost:57800.*ubuntu@$HOSTNAME" >/dev/null 2>&1; then
          echo "Tunnel to {{.WORKSPACE}} already running."
        else
          ssh -f -N -L 57800:localhost:57800 -L 57801:localhost:57801 -L 57802:localhost:57802 -o StrictHostKeyChecking=accept-new "ubuntu@$HOSTNAME" || { echo "Failed to start tunnel."; exit 1; }
          echo "Tunnel to {{.WORKSPACE}} started."
        fi
        echo "  Landing page:      file://${IAC_ROOT_PATH}/portal.html (open in host browser)"
        echo "  Stop: task tunnel:stop -- {{.WORKSPACE}}"

  stop:
    desc: "Stop SSH tunnel for workspace. Use: task tunnel:stop -- dev|prod"
    silent: true
    vars:
      WORKSPACE: "{{.CLI_ARGS}}"
    deps: [":_check:workspace"]
    cmds:
      - |
        HOSTNAME=$(task hostkeys:hostname -- "{{.WORKSPACE}}")
        PIDS=$(pgrep -f "ssh.*-L 57800:localhost:57800.*ubuntu@$HOSTNAME" 2>/dev/null) || true
        if [ -z "$PIDS" ]; then
          echo "No tunnel to {{.WORKSPACE}} running."
        else
          echo "$PIDS" | xargs kill 2>/dev/null || true
          echo "Tunnel to {{.WORKSPACE}} stopped."
        fi
